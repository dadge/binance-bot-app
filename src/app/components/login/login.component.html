<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">🔐</div>
      <h1>Binance Grid Bot Dashboard</h1>
      <p>Entrez le mot de passe pour accéder au dashboard</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (error()) {
        <div class="error-message">
          <span>⚠️ {{ error() }}</span>
        </div>
      }

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          placeholder="Entrez le mot de passe"
          autocomplete="current-password"
          [disabled]="loading()"
          autofocus
        />
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading() || !password()">
        @if (loading()) {
          <span class="spinner"></span>
          Connexion...
        } @else {
          🔓 Se connecter
        }
      </button>
    </form>

    <div class="login-footer">
      <p>💡 Le mot de passe est configuré dans les paramètres de l'add-on Home Assistant</p>
    </div>
  </div>
</div>
